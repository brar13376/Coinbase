global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Auth Service
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:5001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # User Service
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:5002']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Order Service
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:5003']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Wallet Service
  - job_name: 'wallet-service'
    static_configs:
      - targets: ['wallet-service:5004']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Market Data Service
  - job_name: 'market-data-service'
    static_configs:
      - targets: ['market-data-service:5005']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # KYC Service
  - job_name: 'kyc-service'
    static_configs:
      - targets: ['kyc-service:5006']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Fiat Service
  - job_name: 'fiat-service'
    static_configs:
      - targets: ['fiat-service:5007']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Admin Service
  - job_name: 'admin-service'
    static_configs:
      - targets: ['admin-service:5008']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Notification Service
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:5009']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Ledger Service
  - job_name: 'ledger-service'
    static_configs:
      - targets: ['ledger-service:5010']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Custody Service
  - job_name: 'custody-service'
    static_configs:
      - targets: ['custody-service:5011']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # Node Exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 5s

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 5s

  # MongoDB Exporter
  - job_name: 'mongodb-exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']
    scrape_interval: 5s

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 5s