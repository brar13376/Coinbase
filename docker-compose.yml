version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: coinbase-clone-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: coinbase-clone
    volumes:
      - mongodb_data:/data/db
    networks:
      - coinbase-network

  redis:
    image: redis:7-alpine
    container_name: coinbase-clone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - coinbase-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: coinbase-clone-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/coinbase-clone?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-here
      JWT_EXPIRE: 7d
      SESSION_SECRET: your-session-secret-here
      ENCRYPTION_KEY: your-32-character-encryption-key
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server/logs:/app/logs
      - ./server/uploads:/app/uploads
    networks:
      - coinbase-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: coinbase-clone-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - server
    networks:
      - coinbase-network

  nginx:
    image: nginx:alpine
    container_name: coinbase-clone-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - client
      - server
    networks:
      - coinbase-network

volumes:
  mongodb_data:
  redis_data:

networks:
  coinbase-network:
    driver: bridge